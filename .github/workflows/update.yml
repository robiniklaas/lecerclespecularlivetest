name: update flux

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: shuffle items safely
        run: |
          sed -n '/<item>/,/<\/item>/p' feed.xml > items.txt
          shuf items.txt > shuffled.txt

          echo '<?xml version="1.0" encoding="UTF-8" ?>' > new_feed.xml
          echo '<rss version="2.0"><channel>' >> new_feed.xml
          echo '<title>cercle specular — inter_view</title>' >> new_feed.xml
          echo '<description>flux evolutif</description>' >> new_feed.xml
          echo '<link>https://example.com</link>' >> new_feed.xml

          cat shuffled.txt >> new_feed.xml

          echo '</channel></rss>' >> new_feed.xml

          mv new_feed.xml feed.xml

      - name: commit
        run: |
          git config user.name "flux-bot"
          git config user.email "bot@example.com"
          git add feed.xml
          git commit -m "auto update flux" || echo "no changes"
          git push
