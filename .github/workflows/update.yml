name: update flux

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: shuffle items safely
        run: |
          grep "<item>" -A 1 feed.xml | grep -v "<channel>" > items.txt
          shuf items.txt > shuffled.txt

          awk '
          BEGIN {print "<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<rss version=\"2.0\">\n<channel>\n<title>cercle specular — inter_view</title>\n<description>flux evolutif</description>\n<link>https://example.com</link>"}
          {print}
          END {print "</channel>\n</rss>"}
          ' shuffled.txt > new_feed.xml

          mv new_feed.xml feed.xml

      - name: commit
        run: |
          git config user.name "flux-bot"
          git config user.email "bot@example.com"
          git add feed.xml
          git commit -m "auto update flux" || echo "no changes"
          git push
