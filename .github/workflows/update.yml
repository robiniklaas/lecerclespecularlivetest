name: update flux

on:
  schedule:
    - cron: "0 */6 * * *"  # toutes les 6 heures
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: shuffle items only
  run: |
    awk '
      BEGIN { in_items=0 }
      /<item>/ { in_items=1; item=$0; next }
      /<\/item>/ { item=item "\n" $0; print rand() "\t" item; in_items=0; next }
      in_items { item=item "\n" $0; next }
      !in_items { print > "header.xml" }
    ' feed.xml > items.tmp

    sort -k1,1n items.tmp | cut -f2- > items.xml

    awk '
      BEGIN { printed=0 }
      {
        if ($0 ~ /<item>/ && printed==0) {
          system("cat items.xml")
          printed=1
        }
        if ($0 !~ /<item>/ && $0 !~ /<\/item>/) {
          print
        }
      }
    ' feed.xml > new_feed.xml

    mv new_feed.xml feed.xml

      - name: commit changes
        run: |
          git config user.name "flux-bot"
          git config user.email "bot@example.com"
          git add feed.xml
          git commit -m "auto update flux" || echo "no changes"
          git push
