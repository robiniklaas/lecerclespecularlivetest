name: update flux

on:
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: run script
        run: python generate_rss.py

      - name: commit
        run: |
          git config user.name "flux-bot"
          git config user.email "bot@example.com"
          git add feed.xml
          git commit -m "auto update flux" || echo "no changes"
          git push
