name: update flux

on:
  schedule:
    - cron: "0 */6 * * *"  # toutes les 6 heures
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: randomize feed
        run: |
          awk 'BEGIN{srand()} /<item>/{print rand() "\t" $0; next} {print}' feed.xml \
          | sort -k1,1n \
          | cut -f2- \
          > new_feed.xml

          mv new_feed.xml feed.xml

      - name: commit changes
        run: |
          git config user.name "flux-bot"
          git config user.email "bot@example.com"
          git add feed.xml
          git commit -m "auto update flux" || echo "no changes"
          git push
